<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYD Dolphin Charging Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #8A6E2F;
    --black: #0A0A0A;
    --dark: #111111;
    --dark2: #1A1A1A;
    --dark3: #222222;
    --dark4: #2A2A2A;
    --text: #F0E6CC;
    --text-dim: #9A8A6A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at top, #1a1200 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201,168,76,0.03) 40px, rgba(201,168,76,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,168,76,0.03) 40px, rgba(201,168,76,0.03) 41px);
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 28px 0 24px;
    position: relative;
  }
  .header::after {
    content: '';
    display: block;
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto 0;
  }
  .car-icon {
    font-size: 2.8rem;
    line-height: 1;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.5));
  }
  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }
  .header .subtitle {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .battery-info {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.75rem;
    color: var(--gold);
    margin-top: 10px;
  }

  /* Card */
  .card {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 16px;
    padding: 22px 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .field-group {
    margin-bottom: 18px;
  }
  .field-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--gold-light);
    margin-bottom: 8px;
  }

  input[type="number"], input[type="time"] {
    width: 100%;
    background: var(--dark);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 1.1rem;
    font-family: 'Sarabun', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
    -webkit-appearance: none;
  }
  input[type="number"]:focus, input[type="time"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
  }
  input[type="number"]::placeholder { color: var(--text-dim); }
  input:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* Checkbox */
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    cursor: pointer;
    user-select: none;
  }
  .checkbox-row input[type="checkbox"] {
    display: none;
  }
  .custom-check {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(201,168,76,0.5);
    border-radius: 6px;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .custom-check .check-mark {
    display: none;
    color: var(--black);
    font-size: 0.75rem;
    font-weight: 900;
  }
  .checkbox-row input[type="checkbox"]:checked + .custom-check {
    background: var(--gold);
    border-color: var(--gold);
  }
  .checkbox-row input[type="checkbox"]:checked + .custom-check .check-mark {
    display: block;
  }
  .check-label {
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  /* Button */
  .btn-calc {
    width: 100%;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold), var(--gold-light), var(--gold));
    background-size: 200% 200%;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--black);
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    animation: shimmer 3s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .btn-calc:active { transform: scale(0.98); }
  .btn-calc:hover { box-shadow: 0 6px 28px rgba(201,168,76,0.5); }

  /* Results */
  .results-title {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .amp-card {
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    border: 1px solid rgba(201,168,76,0.2);
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(12px); }
  }

  .amp-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: linear-gradient(90deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }
  .amp-badge {
    background: var(--gold);
    color: var(--black);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .amp-power {
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .result-row {
    padding: 11px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .result-row:last-child { border-bottom: none; }
  .result-row.alt { background: rgba(255,255,255,0.025); }

  .result-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .result-value {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .result-value .highlight { color: var(--gold-light); }
  .result-value .time-range { color: var(--gold); font-weight: 500; }
  .result-value .done { color: #8CD978; }
  .result-value .next-day { color: #FF9966; font-size: 0.8rem; font-weight: 400; margin-left: 4px; }

  /* Card color variants */
  .amp-card.c16 { border-color: rgba(91,200,245,0.25); }
  .amp-card.c16 .amp-header { background: linear-gradient(90deg, rgba(91,200,245,0.12), transparent); border-color: rgba(91,200,245,0.2); }
  .amp-card.c16 .amp-badge { background: #5BC8F5; }

  .amp-card.c32 { border-color: rgba(255,120,80,0.25); }
  .amp-card.c32 .amp-header { background: linear-gradient(90deg, rgba(255,120,80,0.12), transparent); border-color: rgba(255,120,80,0.2); }
  .amp-card.c32 .amp-badge { background: #FF7850; }

  .amp-card.c8 { border-color: rgba(140,217,120,0.25); }
  .amp-card.c8 .amp-header { background: linear-gradient(90deg, rgba(140,217,120,0.12), transparent); border-color: rgba(140,217,120,0.2); }
  .amp-card.c8 .amp-badge { background: #8CD978; }

  .amp-card.c10 { border-color: rgba(201,168,76,0.3); }
  .amp-card.c10 .amp-header { background: linear-gradient(90deg, rgba(201,168,76,0.15), transparent); border-color: rgba(201,168,76,0.3); }
  .amp-card.c10 .amp-badge { background: var(--gold); }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin: 20px 0;
  }

  .footer {
    text-align: center;
    padding: 20px 0 8px;
    font-size: 0.68rem;
    color: rgba(201,168,76,0.3);
    letter-spacing: 1px;
  }

  #results { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="car-icon">⚡</div>
    <h1>BYD DOLPHIN</h1>
    <div class="subtitle">CHARGING CALCULATOR</div>
    <div class="battery-info">🔋 Battery 50.25 kWh · Std.</div>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="field-group">
      <div class="field-label">🔋 ปริมาณแบตฯ คงเหลือ (%)</div>
      <input type="number" id="battery" min="0" max="100" placeholder="กรอกตัวเลข เช่น 30" inputmode="numeric">
    </div>

    <div class="field-group">
      <div class="field-label">⏰ เวลาที่ต้องการชาร์จเสร็จ</div>
      <input type="time" id="target-time" value="08:00">
      <label class="checkbox-row" onclick="toggleNoTime()">
        <input type="checkbox" id="no-time">
        <div class="custom-check"><span class="check-mark">✓</span></div>
        <span class="check-label">ไม่ระบุเวลาชาร์จเสร็จ</span>
      </label>
    </div>

    <button class="btn-calc" onclick="calculate()">⚡ คำนวณ</button>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="divider"></div>
    <div class="results-title">— ผลการคำนวณ —</div>
    <div id="result-cards"></div>
  </div>

  <div class="footer">Created by nutwinspector</div>
</div>

<script>
const BATTERY_KWH = 50.25;
const CHARGERS = [
  { amp: 16, kw: 2.9, cls: 'c16', icon: '⚡' },
  { amp: 32, kw: 6.2, cls: 'c32', icon: '🚀' },
  { amp:  8, kw: 1.2, cls: 'c8',  icon: '🌿' },
  { amp: 10, kw: 1.7, cls: 'c10', icon: '✨' },
];

function toggleNoTime() {
  // Let the browser handle checkbox toggle first, then sync
  setTimeout(() => {
    const checked = document.getElementById('no-time').checked;
    const timeInput = document.getElementById('target-time');
    timeInput.disabled = checked;
  }, 0);
}

function formatDuration(hours) {
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  if (h === 0) return `${m} นาที`;
  if (m === 0) return `${h} ชั่วโมง`;
  return `${h} ชม. ${m} นาที`;
}

// Returns { display: "HH:MM", nextDay: bool }
function addMinutesToNow(minutes) {
  const now = new Date();
  const finish = new Date(now.getTime() + minutes * 60000);
  const hh = String(finish.getHours()).padStart(2, '0');
  const mm = String(finish.getMinutes()).padStart(2, '0');
  const sameDay = finish.getDate() === now.getDate() &&
                  finish.getMonth() === now.getMonth() &&
                  finish.getFullYear() === now.getFullYear();
  return { display: `${hh}:${mm}`, nextDay: !sameDay };
}

function subtractMinutes(timeStr, minutes) {
  const [h, m] = timeStr.split(':').map(Number);
  let total = h * 60 + m - Math.round(minutes);
  total = ((total % 1440) + 1440) % 1440;
  const hh = String(Math.floor(total / 60)).padStart(2, '0');
  const mm = String(total % 60).padStart(2, '0');
  return `${hh}:${mm}`;
}

function nowStr() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function calculate() {
  const battPct = parseFloat(document.getElementById('battery').value);
  const noTime  = document.getElementById('no-time').checked;
  const targetTime = document.getElementById('target-time').value;

  if (isNaN(battPct) || battPct < 0 || battPct > 100) {
    alert('กรุณากรอกปริมาณแบตฯ ให้ถูกต้อง (0–100%)');
    return;
  }
  if (!noTime && !targetTime) {
    alert('กรุณาระบุเวลาที่ต้องการชาร์จเสร็จ หรือติ๊ก "ไม่ระบุเวลาชาร์จเสร็จ"');
    return;
  }

  const currentKwh = BATTERY_KWH * (battPct / 100);
  const kwh80  = BATTERY_KWH * 0.80;
  const kwh100 = BATTERY_KWH * 1.00;

  const cards = document.getElementById('result-cards');
  cards.innerHTML = '';

  CHARGERS.forEach((c, idx) => {
    const needed80  = Math.max(0, kwh80  - currentKwh);
    const needed100 = Math.max(0, kwh100 - currentKwh);
    const mins80    = (needed80  / c.kw) * 60;
    const mins100   = (needed100 / c.kw) * 60;
    const dur80     = formatDuration(needed80  / c.kw);
    const dur100    = formatDuration(needed100 / c.kw);
    const already80  = battPct >= 80;
    const already100 = battPct >= 100;

    let row2html, row4html;

    if (noTime) {
      // Mode: show actual finish time from NOW
      const f80  = addMinutesToNow(mins80);
      const f100 = addMinutesToNow(mins100);
      const start = nowStr();
      row2html = already80
        ? `<span class="done">แบตฯ เกิน 80% แล้ว ✓</span>`
        : `<span class="time-range">${start} น. → ${f80.display} น.${f80.nextDay ? '<span class="next-day">(วันถัดไป)</span>' : ''}</span>`;
      row4html = already100
        ? `<span class="done">แบตฯ เต็มแล้ว ✓</span>`
        : `<span class="time-range">${start} น. → ${f100.display} น.${f100.nextDay ? '<span class="next-day">(วันถัดไป)</span>' : ''}</span>`;
    } else {
      // Mode: back-calculate start time from target
      const start80  = subtractMinutes(targetTime, mins80);
      const start100 = subtractMinutes(targetTime, mins100);
      row2html = already80
        ? `<span class="done">แบตฯ เกิน 80% แล้ว ✓</span>`
        : `<span class="time-range">${start80} → ${targetTime} น.</span>`;
      row4html = already100
        ? `<span class="done">แบตฯ เต็มแล้ว ✓</span>`
        : `<span class="time-range">${start100} → ${targetTime} น.</span>`;
    }

    const card = document.createElement('div');
    card.className = `amp-card ${c.cls}`;
    card.style.animationDelay = `${idx * 0.08}s`;
    card.innerHTML = `
      <div class="amp-header">
        <span class="amp-badge">${c.amp}A</span>
        <span class="amp-power">${c.icon} กำลังชาร์จจริง ${c.kw} kW</span>
      </div>
      <div class="result-row">
        <div class="result-label">🔋 ชาร์จ ${c.amp}A จนถึง 80%</div>
        <div class="result-value">
          ${already80 ? '<span class="done">แบตฯ เกิน 80% แล้ว ✓</span>' : `ใช้เวลา <span class="highlight">${dur80}</span>`}
        </div>
      </div>
      <div class="result-row alt">
        <div class="result-label">⏱️ ${noTime ? 'เริ่มชาร์จตอนนี้ ถึง' : 'ต้องเริ่มชาร์จเวลา'}</div>
        <div class="result-value">${row2html}</div>
      </div>
      <div class="result-row">
        <div class="result-label">⚡ ชาร์จ ${c.amp}A จนถึง 100%</div>
        <div class="result-value">
          ${already100 ? '<span class="done">แบตฯ เต็มแล้ว ✓</span>' : `ใช้เวลา <span class="highlight">${dur100}</span>`}
        </div>
      </div>
      <div class="result-row alt">
        <div class="result-label">⏱️ ${noTime ? 'เริ่มชาร์จตอนนี้ ถึง' : 'ต้องเริ่มชาร์จเวลา'}</div>
        <div class="result-value">${row4html}</div>
      </div>
    `;
    cards.appendChild(card);
  });

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
